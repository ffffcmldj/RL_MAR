# 环境变量配置
environment:
  rag_data_dir: "{ROOTPATH}/data/rag_data"
  shot_data_dir: "{ROOTPATH}/data/rag_data/few_shots"
  log_dir: "{ROOTPATH}/logs"
  st_plan: "{ROOTPATH}/data/rag_data/st/st_case_plan"
  instruction_dir: "{ROOTPATH}/data/rag_data/instructions"
  st_code_dir: "{ROOTPATH}/data/rag_data/st/st_case_code"
  codesys_dir: "D:/Tools/CODESYS/CODESYS/Common/CODESYS.exe"

# 模型配置
model:
  name: "gpt-4o"
  max_tokens: 16384
  temperature: 0.1
  top_p: 0.9

# 检索模型配置（已禁用）
retrieve:
  model: "glm-4-airx"
  temperature: 0.1
  top_p: 0.9

# 模型器设置
modeler:
  plan_set_name: "oscat_english"

# 验证代理配置
verify:
  count: 3
  openness: "http://127.0.0.1:9000"
  codesys_ip:
    - "http://127.0.0.1:9000/api/v1/pou/workflow"

# RAG检索配置
retrieval:
  case_alternatives:
    - "ARRAY_TREND"
    - "AUTORUN"
    - "IRTRANS_RCV_1"
  b25_model: "BM25Okapi"

# 指令配置
instruction:
  path:
    - "{ROOTPATH}/data/rag_data/instructions/st_brief_keywords.jsonl"
  score_threshold: 50
  top_k: 2
  function_usage_path: "{ROOTPATH}/data/rag_data/st/st_functions_usage.json"

# 工作流实验设置
workflow:
  retrieve_disabled: true      # 关RAG（无智谱key）
  modeling_disabled: false     # 开Planner
  debugger_disabled: false     # 开Debugger（接CODESYS）
  api_rec_disabled : true      # 关API推荐（数据不适配）
  auto_learn_disabled : true   # 关自动学习
  is_coding_fewshot: true
  is_retrieve_fewshot: false
  is_modeling_fewshot: false
  is_debugger_fewshot: false
  is_api_rec_fewshot: false
  is_auto_learn_fewshot: false
